<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produk - ReviewLokal</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="assets/css/style.css" rel="stylesheet" />
</head>
<body>
  <div id="navbarApp"></div>

  <main class="container py-4">
    <section id="statsProduk" class="row g-3 mb-4"></section>

    <div class="toolbar-section mb-4">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3">
        <h2 class="fw-bold mb-0">Daftar Produk</h2>

        <div class="search-box">
          <i class="fas fa-magnifying-glass"></i>
          <input
            type="text"
            id="searchInput"
            class="form-control form-modern"
            placeholder="Cari produk, brand, kategori..."
          />
        </div>
      </div>

      <div id="categoryFilter" class="category-scroll"></div>

      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mt-3">
        <div id="paginationInfo" class="text-muted small"></div>

        <div class="d-flex align-items-center gap-2">
          <label for="perPageSelect" class="text-muted small fw-semibold mb-0">
            Tampilkan
          </label>

          <select id="perPageSelect" class="form-select form-select-sm rounded-pill" style="width: 90px">
            <option value="3">3</option>
            <option value="6" selected>6</option>
            <option value="9">9</option>
            <option value="12">12</option>
            <option value="24">24</option>
          </select>

          <span class="text-muted small">produk</span>
        </div>
      </div>
    </div>

    <div id="loadingProduk" class="alert alert-light border text-center rounded-4">
      <i class="fas fa-spinner fa-spin me-2"></i> Memuat produk...
    </div>

    <div id="productList" class="row g-4"></div>

    <div id="paginationProduk" class="mt-4"></div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/products-page.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
